name: Build and Release Signed APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build and Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$HOME/keystore"
          echo "$KEYSTORE_BASE64" | base64 -d > "$HOME/keystore/release.keystore"

      - name: Build release APK
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8 -XX:+HeapDumpOnOutOfMemoryError"
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$HOME/keystore/release.keystore" \
            -Pandroid.injected.signing.store.password="$SIGNING_STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$SIGNING_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$SIGNING_KEY_PASSWORD"

      - name: Verify APK signature
        id: locate_apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose "$APK_PATH"

      - name: Clean up keystore
        if: always()
        run: rm -f "$HOME/keystore/release.keystore"

      - name: Get version from tag
        id: version
        run: |
          if [ "${{ github.ref_type }}" == "tag" ]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
          fi

      - name: Rename APK
        id: rename_apk
        run: |
          FINAL_PATH="app/build/outputs/apk/release/yubal-${{ steps.version.outputs.version }}.apk"
          mv "${{ steps.locate_apk.outputs.path }}" "$FINAL_PATH"
          echo "path=$FINAL_PATH" >> "$GITHUB_OUTPUT"

      - name: Get APK info
        id: apk_info
        run: |
          APK_SIZE=$(stat -c%s "${{ steps.rename_apk.outputs.path }}")
          APK_SIZE_MB=$(echo "scale=2; $APK_SIZE / 1024 / 1024" | bc)
          echo "apk_size=${APK_SIZE_MB}MB" >> "$GITHUB_OUTPUT"

      - name: Create Release with APK
        if: github.ref_type == 'tag'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > release_body.md << 'EOF'
          ## yubal Android Release ${{ steps.version.outputs.version }}

          ### Download
          - **APK Size:** ${{ steps.apk_info.outputs.apk_size }}
          - **Target version:** Android 13+

          ### Installation Instructions
          1. Download the APK from the assets below
          2. Enable "Install from unknown sources" in your Android settings
          3. Install the APK file

          ### Signing
          This build is signed with the official release key. Upgrading in place from a
          previous release-signed build will work without needing to uninstall first.

          ### Build Info
          - Commit: ${{ github.sha }}
          EOF

          gh release create "${{ steps.version.outputs.version }}" \
            "${{ steps.rename_apk.outputs.path }}" \
            --title "Release ${{ steps.version.outputs.version }}" \
            --notes-file release_body.md \
            --draft=false \
            --prerelease=false

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-apk-${{ steps.version.outputs.version }}
          path: ${{ steps.rename_apk.outputs.path }}
          retention-days: 30
